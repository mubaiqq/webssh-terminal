<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WebSSH Terminal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root,[data-theme=dark]{
  --bg:#0f0f1a;
  --glass:rgba(18,18,30,0.72);--glass2:rgba(24,24,40,0.62);--glass3:rgba(32,32,52,0.55);
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e8e8f0;--text2:#9090b0;--text3:#5a5a78;
  --accent:#7c6cf0;--accent2:#a89cf8;--accent-bg:rgba(124,108,240,0.12);
  --green:#3dd68c;--red:#f06060;--yellow:#f8d860;--blue:#58a6ff;
  --radius:10px;--radius-sm:6px;--radius-lg:14px;
  --shadow:0 2px 20px rgba(0,0,0,0.25);--shadow-lg:0 8px 40px rgba(0,0,0,0.4);
  --blur:blur(20px);--header-h:44px;
}
[data-theme=light]{
  --bg:#e8eaf0;
  --glass:rgba(255,255,255,0.78);--glass2:rgba(255,255,255,0.68);--glass3:rgba(240,240,248,0.6);
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.12);
  --text:#1c1c30;--text2:#606080;--text3:#9494aa;
  --accent:#6c5ce7;--accent2:#a29bfe;--accent-bg:rgba(108,92,231,0.08);
  --green:#00b894;--red:#e17055;--yellow:#f0c040;--blue:#0984e3;
  --shadow:0 2px 16px rgba(0,0,0,0.06);--shadow-lg:0 8px 32px rgba(0,0,0,0.1);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

/* ─── Background ─── */
#bgLayer{position:fixed;inset:0;z-index:0;pointer-events:none}
#bgLayer img{width:100%;height:100%;object-fit:cover}

/* ─── Loading Screen ─── */
.loading-screen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;transition:opacity .4s}
.loading-screen.hide{opacity:0;pointer-events:none}
.loader{width:48px;height:48px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:14px;color:var(--text2);animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ─── Password Gate ─── */
.gate{position:fixed;inset:0;z-index:10000;background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden}
.gate::before{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(124,108,240,0.15),transparent 70%);top:-100px;right:-100px;animation:gatePulse 6s ease-in-out infinite}
.gate::after{content:'';position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(61,214,140,0.1),transparent 70%);bottom:-80px;left:-80px;animation:gatePulse 8s ease-in-out infinite reverse}
@keyframes gatePulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.3);opacity:1}}
.gate-box{background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border2);border-radius:18px;padding:40px 34px;width:90%;max-width:380px;text-align:center;box-shadow:var(--shadow-lg);position:relative;z-index:1;animation:gateIn .4s ease}
@keyframes gateIn{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:none}}
.gate-box .gate-icon{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:26px;color:#fff;box-shadow:0 4px 20px rgba(124,108,240,0.3)}
.gate-box h2{font-size:20px;font-weight:700;margin-bottom:6px;letter-spacing:-.3px}
.gate-box p{font-size:13px;color:var(--text2);margin-bottom:24px}
.gate-box .gate-input-wrap{position:relative;margin-bottom:4px}
.gate-box .gate-input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.gate-box input{width:100%;background:rgba(0,0,0,0.15);border:1.5px solid var(--border);color:var(--text);padding:12px 14px 12px 38px;border-radius:10px;font-size:15px;outline:none;font-family:inherit;transition:all .25s;letter-spacing:3px}
.gate-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg);background:rgba(0,0,0,0.2)}
.gate-box input::placeholder{letter-spacing:normal}
.gate-box .gate-err{font-size:12px;color:var(--red);margin-top:10px;min-height:18px;transition:all .2s}
.gate-box button{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:18px;transition:all .2s;font-family:inherit;position:relative;overflow:hidden}
.gate-box button:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 16px rgba(124,108,240,0.35)}
.gate-box button:active{transform:translateY(0)}
.gate-box button.loading{pointer-events:none;opacity:.8}
.gate-box button.loading::after{content:'';width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-left:8px}

/* ─── App ─── */
.app{position:relative;z-index:1;display:flex;height:100vh;flex-direction:column;display:none}
.app.show{display:flex}

/* ─── Header ─── */
.header{display:flex;align-items:center;height:var(--header-h);padding:0 12px;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100;gap:8px}
.logo{display:flex;align-items:center;gap:7px;cursor:pointer;flex-shrink:0}
.logo i{font-size:16px;color:var(--accent)}
.logo span{font-size:14px;font-weight:700;color:var(--text)}
.header-center{flex:1;display:flex;align-items:center;justify-content:center}
.nav{display:flex;gap:1px;background:var(--glass2);backdrop-filter:var(--blur);border-radius:8px;padding:2px;border:1px solid var(--border)}
.nav-btn{padding:5px 14px;border-radius:6px;border:none;background:none;color:var(--text2);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;display:flex;align-items:center;gap:5px;font-family:inherit;white-space:nowrap}
.nav-btn:hover{color:var(--text);background:rgba(255,255,255,0.06)}
.nav-btn.active{background:var(--accent);color:#fff}
.nav-btn i{font-size:11px}
.header-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.hdr-btn{width:30px;height:30px;border-radius:6px;border:none;background:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:13px}
.hdr-btn:hover{background:rgba(255,255,255,0.08);color:var(--text)}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:all .3s}
.sdot.on{background:var(--green);box-shadow:0 0 6px rgba(61,214,140,0.5)}

/* ─── Pages ─── */
.main{flex:1;overflow:hidden}
.page{height:100%;display:none}
.page.active{display:flex;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}

/* ─── Servers ─── */
.pg-servers{flex-direction:column;align-items:center;padding:28px 20px;overflow-y:auto}
.pg-servers h1{font-size:20px;font-weight:700;margin-bottom:3px}
.pg-servers .sub{color:var(--text2);font-size:12px;margin-bottom:20px}
.srv-list{width:100%;max-width:720px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:540px){.srv-list{grid-template-columns:1fr}}
.srv-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--glass2);backdrop-filter:var(--blur);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .2s;position:relative}
.srv-row:hover{border-color:var(--accent);background:var(--accent-bg)}
.srv-row .sr-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.srv-row.local .sr-icon{background:rgba(61,214,140,0.12);color:var(--green)}
.srv-row.remote .sr-icon{background:rgba(88,166,255,0.12);color:var(--blue)}
.srv-row .sr-info{flex:1;min-width:0}
.srv-row .sr-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.srv-row .sr-addr{font-size:11px;color:var(--text2);margin-top:2px;font-family:'SF Mono',Monaco,Consolas,monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.srv-row .sr-actions{display:flex;gap:4px;flex-shrink:0}
.sr-act{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--glass3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s}
.sr-act:hover{background:var(--red);color:#fff;border-color:var(--red)}
.sr-act.edit-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.srv-add{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 14px;border:1px dashed var(--border2);border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:12px;transition:all .2s;background:var(--glass);backdrop-filter:var(--blur)}
.srv-add:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

/* ─── Terminal ─── */
.pg-terminal{flex-direction:column}
.term-tabs{display:flex;align-items:flex-end;background:var(--glass);backdrop-filter:var(--blur);border-bottom:1px solid var(--border);padding:0 6px;height:38px;gap:1px;overflow-x:auto;scrollbar-width:none}
.term-tabs::-webkit-scrollbar{display:none}
.t-tab{display:flex;align-items:center;gap:6px;padding:0 14px;height:30px;font-size:12px;color:var(--text2);cursor:pointer;border-radius:8px 8px 0 0;transition:all .15s;white-space:nowrap;border:none;background:rgba(255,255,255,0.03);font-family:inherit;position:relative;margin-top:6px;border:1px solid transparent;border-bottom:none}
.t-tab:hover{background:rgba(255,255,255,0.06);color:var(--text)}
.t-tab.on{background:var(--glass2);color:var(--text);border-color:var(--border);border-bottom-color:var(--glass2);height:32px;margin-top:4px}
.t-tab i.fa-terminal{font-size:10px;color:var(--accent);opacity:0.7}
.t-tab.on i.fa-terminal{opacity:1}
.t-tab .tx{max-width:120px;overflow:hidden;text-overflow:ellipsis}
.t-x{width:20px;height:20px;border-radius:50%;border:1px solid var(--border);background:var(--glass3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;opacity:0.7;transition:all .15s;margin-left:2px;margin-right:-4px;flex-shrink:0}
.t-tab:hover .t-x{opacity:1}
.t-x:hover{background:var(--red);color:#fff;border-color:var(--red);opacity:1!important}
.t-add{width:26px;height:26px;border-radius:6px;border:none;background:none;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;margin:6px 0 0 4px;flex-shrink:0}
.t-add:hover{color:var(--accent);background:rgba(255,255,255,0.06)}
.term-layout{display:flex;flex:1;overflow:hidden}
.term-side{width:230px;background:var(--glass);backdrop-filter:var(--blur);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-hd{padding:9px 12px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:5px}
.sb-hd i{font-size:10px}
.sb-list{flex:1;overflow-y:auto;padding:5px}
.sb-item{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:5px;cursor:pointer;font-size:12px;transition:all .12s;margin-bottom:1px}
.sb-item:hover{background:rgba(255,255,255,0.06)}
.sb-item .sb-cmd{flex:1;min-width:0;font-family:monospace;font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-item .sb-name{font-size:11px;flex-shrink:0}
.sb-item .sb-run{width:20px;height:20px;border-radius:4px;border:none;background:var(--green);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;opacity:0;transition:all .1s;flex-shrink:0}
.sb-item:hover .sb-run{opacity:1}
.term-body{flex:1;position:relative;overflow:hidden}
.term-pane{position:absolute;inset:0;display:none}
.term-pane.on{display:block}
.term-pane .xterm{height:100%;background:transparent!important}
.term-pane .xterm .xterm-viewport{background:transparent!important;will-change:transform;-webkit-overflow-scrolling:touch}
.term-pane .xterm .xterm-screen{background:transparent!important;will-change:transform}
.term-pane .xterm .xterm-viewport::-webkit-scrollbar{width:6px}
.term-pane .xterm .xterm-viewport::-webkit-scrollbar-track{background:transparent}
.term-pane .xterm .xterm-viewport::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px}

/* ─── Virtual Keyboard (Floating) ─── */
.vkb-panel{position:fixed;z-index:900;width:280px;height:320px;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:14px;box-shadow:var(--shadow-lg);display:none;flex-direction:column;overflow:hidden;touch-action:none}
.vkb-panel.show{display:flex}
.vkb-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);cursor:move;user-select:none;-webkit-user-select:none;flex-shrink:0}
.vkb-header span{font-size:11px;font-weight:600;color:var(--text2)}
.vkb-header .vkb-close{width:22px;height:22px;border-radius:50%;border:none;background:rgba(255,255,255,0.06);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px}
.vkb-header .vkb-close:hover{background:var(--red);color:#fff}
.vkb-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px;display:flex;flex-direction:column;gap:5px;scrollbar-width:none}
.vkb-body::-webkit-scrollbar{display:none}
.vkb-row{display:flex;gap:4px;justify-content:center}
.vkb-btn{width:42px;height:36px;border-radius:7px;border:1px solid var(--border);background:var(--glass2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;font-family:inherit;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;padding:0;transition:all .08s;flex-shrink:0}
.vkb-btn:active{background:var(--accent);color:#fff;border-color:var(--accent);transform:scale(.93)}
.vkb-btn.wide{width:56px;font-size:11px}
.vkb-btn.wider{width:70px;font-size:11px}
.vkb-btn.space{flex:1;max-width:130px}
.vkb-btn.mod{font-size:9px;font-weight:700;letter-spacing:.5px}
.vkb-btn.mod.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.vkb-btn.combo{font-size:10px;font-weight:600;width:56px}
.vkb-pg{display:flex;justify-content:center;align-items:center;gap:4px;padding:6px 8px;border-top:1px solid var(--border);flex-shrink:0}
.vkb-pg button{height:22px;border-radius:5px;border:1px solid var(--border);background:var(--glass2);color:var(--text2);cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;padding:0 8px;font-family:inherit}
.vkb-pg button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.vkb-clip-page{display:flex;flex-direction:column;gap:8px;padding:4px;height:100%}
.vkb-clip-textarea{flex:1;width:100%;border-radius:8px;border:1px solid var(--border);background:var(--glass2);color:var(--text);padding:10px;font-size:13px;font-family:inherit;outline:none;resize:none;box-sizing:border-box}
.vkb-clip-textarea:focus{border-color:var(--accent)}
.vkb-clip-textarea::placeholder{color:var(--text3)}
.vkb-clip-actions{display:flex;gap:8px;flex-shrink:0}
.vkb-clip-action{flex:1;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--glass2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;font-weight:600;font-family:inherit;transition:all .12s}
.vkb-clip-action:active{transform:scale(.95)}
.vkb-clip-action.paste:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.vkb-clip-action.send:hover{background:var(--green,#10b981);color:#fff;border-color:var(--green,#10b981)}

@media(max-width:768px){.term-side{display:none}.logo span{display:none}.nav-btn span{display:none}.nav-btn{padding:5px 10px}.header{padding:0 8px}}

/* ─── Commands ─── */
.pg-cmds{flex-direction:column;align-items:center;padding:24px 20px;overflow-y:auto}
.pg-cmds .top-bar{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:720px;margin-bottom:18px}
.pg-cmds .top-bar h2{font-size:18px;font-weight:700;display:flex;align-items:center;gap:7px}
.pg-cmds .top-bar h2 i{color:var(--accent)}
.cmd-list{width:100%;max-width:720px;display:flex;flex-direction:column;gap:6px}
.cmd-row{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--glass2);backdrop-filter:var(--blur);border:1px solid var(--border);border-radius:var(--radius);transition:all .2s}
.cmd-row:hover{border-color:var(--border2)}
.cmd-row .cr-icon{width:30px;height:30px;border-radius:7px;background:var(--accent-bg);backdrop-filter:var(--blur);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--accent);flex-shrink:0}
.cmd-row .cr-info{flex:1;min-width:0}
.cmd-row .cr-name{font-size:13px;font-weight:500}
.cmd-row .cr-code{font-size:11px;color:var(--text3);font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.cmd-row .cr-cat{font-size:10px;color:var(--accent2);background:var(--accent-bg);backdrop-filter:var(--blur);padding:1px 7px;border-radius:4px;flex-shrink:0}
.cmd-row .cr-actions{display:flex;gap:3px;flex-shrink:0}
.cr-btn{width:26px;height:26px;border-radius:5px;border:none;background:rgba(255,255,255,0.06);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s}
.cr-btn:hover{background:var(--accent);color:#fff}
.cr-btn.del:hover{background:var(--red)}
.cmd-empty{text-align:center;color:var(--text3);padding:48px 0;font-size:12px}

/* ─── Notes ─── */
.pg-notes{flex-direction:row;overflow:hidden}
.notes-side{width:210px;background:var(--glass);backdrop-filter:var(--blur);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.ns-hd{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ns-hd span{font-size:12px;font-weight:600}
.ns-list{flex:1;overflow-y:auto;padding:5px}
.ns-item{padding:7px 9px;border-radius:5px;cursor:pointer;margin-bottom:1px;transition:all .12s}
.ns-item:hover{background:rgba(255,255,255,0.06)}
.ns-item.on{background:var(--accent-bg);border-left:2px solid var(--accent)}
.ns-item .ni-t{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ns-item .ni-d{font-size:10px;color:var(--text3);margin-top:1px}
.note-area{flex:1;display:flex;flex-direction:column;padding:18px;overflow:hidden;background:var(--glass2);backdrop-filter:var(--blur)}
.note-area input{background:none;border:none;color:var(--text);font-size:18px;font-weight:600;outline:none;margin-bottom:10px}
.note-area input::placeholder{color:var(--text3)}
.note-area textarea{flex:1;background:none;border:none;color:var(--text);font-size:13px;line-height:1.7;outline:none;resize:none}
.note-area textarea::placeholder{color:var(--text3)}
.note-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px;flex-direction:column;gap:6px}
.note-empty i{font-size:32px;opacity:0.15}
@media(max-width:768px){.notes-side{width:100%;max-height:140px;border-bottom:1px solid var(--border);border-right:none}.pg-notes{flex-direction:column}}

/* ─── Buttons ─── */
.btn{padding:6px 13px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:5px;font-family:inherit}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{filter:brightness(1.12)}
.btn-g{background:none;color:var(--text2)}.btn-g:hover{background:rgba(255,255,255,0.06);color:var(--text)}
.btn-d{color:var(--red);background:none}.btn-d:hover{background:rgba(240,96,96,0.1)}
.btn-sm{padding:4px 9px;font-size:11px}
.btn.loading{pointer-events:none;opacity:.7;position:relative}
.btn.loading::after{content:'';width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── Modal ─── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:var(--glass);backdrop-filter:var(--blur);border:1px solid var(--border);border-radius:var(--radius-lg);width:92%;max-width:460px;box-shadow:var(--shadow-lg);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:14px;font-weight:600}
.modal-body{padding:16px}
.modal-foot{padding:10px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;background:rgba(0,0,0,0.2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:var(--radius-sm);font-size:12px;outline:none;transition:border .15s;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg-row{display:flex;gap:10px}.fg-row .fg{flex:1}
.radio-grp{display:flex;gap:6px}
.radio-opt{flex:1;padding:7px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;text-align:center;font-size:12px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px}
.radio-opt:hover{border-color:var(--accent)}
.radio-opt.sel{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.radio-opt input{display:none}
.auth-section{margin-top:10px;padding:10px;background:rgba(0,0,0,0.15);border-radius:var(--radius-sm);border:1px solid var(--border)}

/* ─── Toast ─── */
.toasts{position:fixed;top:52px;right:12px;z-index:2000;display:flex;flex-direction:column;gap:5px}
.toast{background:var(--glass);backdrop-filter:var(--blur);border:1px solid var(--border);border-radius:7px;padding:9px 13px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:7px;font-size:11px;min-width:170px;max-width:300px;animation:toastIn .2s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
.toast.ok{border-left:3px solid var(--green)}.toast.err{border-left:3px solid var(--red)}.toast.info{border-left:3px solid var(--accent)}

/* ─── Settings ─── */
.sett-panel{position:fixed;top:var(--header-h);right:10px;width:300px;background:var(--glass);backdrop-filter:var(--blur);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);z-index:500;display:none;max-height:calc(100vh - 60px);overflow-y:auto}
.sett-panel.show{display:block;animation:modalIn .15s ease}
.sp-sec{padding:12px 16px;border-bottom:1px solid var(--border)}
.sp-sec:last-child{border-bottom:none}
.sp-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.sp-row{display:flex;align-items:center;justify-content:space-between;padding:3px 0}
.sp-row label{font-size:12px}
.sp-row select,.sp-row input[type=color]{background:rgba(0,0,0,0.2);border:1px solid var(--border);color:var(--text);padding:3px 6px;border-radius:5px;font-size:11px;outline:none}
.sp-row input[type=color]{width:26px;height:22px;padding:1px;cursor:pointer;border-radius:4px}
.theme-btns{display:flex;gap:5px}
.theme-btn{width:36px;height:24px;border-radius:5px;border:2px solid var(--border);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:11px}
.theme-btn:hover{border-color:var(--accent)}
.theme-btn.on{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}
.theme-btn.dk{background:#0f0f1a;color:#e8e8f0}
.theme-btn.lt{background:#f2f3f7;color:#1c1c30}
.op-slider{width:100%;accent-color:var(--accent)}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}
</style>
</head>
<body>

<!-- Background -->
<div id="bgLayer"></div>

<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
  <div class="loader"></div>
  <div class="loader-text">正在加载...</div>
</div>

<!-- Password Gate -->
<div class="gate" id="gate" style="display:none">
  <div class="gate-box">
    <div class="gate-icon"><i class="fa-solid fa-bolt"></i></div>
    <h2>WebSSH Terminal</h2>
    <p>输入密码以访问终端</p>
    <div class="gate-input-wrap">
      <i class="fa-solid fa-lock"></i>
      <input type="password" id="gatePwd" placeholder="请输入密码" autofocus>
    </div>
    <div class="gate-err" id="gateErr"></div>
    <button id="gateBtn" onclick="submitGate()">登  录</button>
  </div>
</div>

<!-- App -->
<div class="app" id="app">
  <header class="header">
    <div class="logo" onclick="goPage('servers')"><i class="fa-solid fa-bolt"></i><span>WebSSH</span></div>
    <div class="header-center">
      <nav class="nav">
        <button class="nav-btn active" data-p="servers"><i class="fa-solid fa-server"></i><span>服务器</span></button>
        <button class="nav-btn" data-p="terminal"><i class="fa-solid fa-terminal"></i><span>终端</span></button>
        <button class="nav-btn" data-p="commands"><i class="fa-solid fa-code"></i><span>命令</span></button>
        <button class="nav-btn" data-p="notes"><i class="fa-solid fa-note-sticky"></i><span>笔记</span></button>
      </nav>
    </div>
    <div class="header-right">
      <div class="sdot" id="sDot"></div>
      <button class="hdr-btn" id="vkbToggle" onclick="toggleVKB()" title="虚拟键盘"><i class="fa-solid fa-keyboard"></i></button>
      <button class="hdr-btn" onclick="toggleTheme()" title="主题"><i class="fa-solid fa-circle-half-stroke"></i></button>
      <button class="hdr-btn" onclick="toggleSett()" title="设置"><i class="fa-solid fa-gear"></i></button>
    </div>
  </header>
  <main class="main">
    <div class="page pg-servers active" id="pg-servers">
      <h1><i class="fa-solid fa-server" style="color:var(--accent);margin-right:5px;font-size:18px"></i> 我的服务器</h1>
      <p class="sub">点击进入终端 · 支持多标签同时连接</p>
      <div class="srv-list" id="srvList"></div>
    </div>
    <div class="page pg-terminal" id="pg-terminal">
      <div class="term-tabs" id="termTabs"></div>
      <div class="term-layout">
        <aside class="term-side">
          <div class="sb-hd"><i class="fa-solid fa-bolt"></i> 快捷命令</div>
          <div class="sb-list" id="qCmds"></div>
        </aside>
        <div class="term-body" id="termBody"></div>
      </div>
    </div>
    <div class="page pg-cmds" id="pg-commands">
      <div class="top-bar">
        <h2><i class="fa-solid fa-code"></i> 命令管理</h2>
        <button class="btn btn-p" onclick="showAddCmd()"><i class="fa-solid fa-plus"></i> 添加</button>
      </div>
      <div class="cmd-list" id="cmdList"></div>
    </div>
    <div class="page pg-notes" id="pg-notes">
      <aside class="notes-side">
        <div class="ns-hd"><span><i class="fa-solid fa-note-sticky"></i> 笔记</span><button class="btn btn-sm btn-p" onclick="createNote()"><i class="fa-solid fa-plus"></i></button></div>
        <div class="ns-list" id="nsList"></div>
      </aside>
      <div class="note-area" id="noteArea">
        <div class="note-empty" id="noteEmpty"><i class="fa-solid fa-note-sticky"></i><span>选择或新建笔记</span></div>
        <input id="nTitle" placeholder="标题" style="display:none">
        <textarea id="nContent" placeholder="内容..." style="display:none"></textarea>
      </div>
    </div>
  </main>
</div>

<!-- Settings Panel -->
<div class="sett-panel" id="settPanel">
  <div class="sp-sec">
    <div class="sp-lbl">主题</div>
    <div class="theme-btns">
      <div class="theme-btn dk on" onclick="setTheme('dark')"><i class="fa-solid fa-moon"></i></div>
      <div class="theme-btn lt" onclick="setTheme('light')"><i class="fa-solid fa-sun"></i></div>
    </div>
  </div>
  <div class="sp-sec">
    <div class="sp-lbl">背景</div>
    <div class="sp-row"><label>类型</label><select id="sBgType" onchange="applyBg()"><option value="color">纯色</option><option value="url">外链</option><option value="upload">本地</option></select></div>
    <div class="sp-row" id="rowBgC"><label>颜色</label><input type="color" id="sBgColor" value="#0f0f1a" onchange="applyBg()"></div>
    <div class="sp-row" id="rowBgU" style="display:none"><label>URL</label><input type="text" id="sBgUrl" placeholder="https://..." style="width:150px;font-size:11px" onchange="applyBg()"></div>
    <div class="sp-row" id="rowBgF" style="display:none"><label>图片</label><input type="file" id="sBgFile" accept="image/*" onchange="uploadBg(this)" style="font-size:11px"></div>
    <div class="sp-row"><label>透明度</label><input type="range" class="op-slider" id="sBgOp" min="0.3" max="1" step="0.05" value="1" onchange="applyBg()"></div>
  </div>
  <div class="sp-sec">
    <div class="sp-lbl">终端</div>
    <div class="sp-row"><label>字号</label><select id="sFontSize" onchange="applyTermOpts()"><option value="12">12</option><option value="13">13</option><option value="14" selected>14</option><option value="15">15</option><option value="16">16</option><option value="18">18</option></select></div>
  </div>
  <div class="sp-sec">
    <div class="sp-lbl">安全</div>
    <div class="sp-row"><label>修改密码</label><input type="password" id="sNewPwd" placeholder="新密码" style="width:120px;font-size:11px;padding:4px 8px"></div>
    <div class="sp-row" style="margin-top:6px"><label></label><button class="btn btn-sm btn-p" onclick="changePwd()">保存密码</button></div>
  </div>
</div>

<div class="toasts" id="toasts"></div>
<div id="modals"></div>

<!-- Floating Virtual Keyboard -->
<div class="vkb-panel" id="vkbPanel">
  <div class="vkb-header" id="vkbDrag">
    <span><i class="fa-solid fa-keyboard" style="margin-right:5px;color:var(--accent)"></i>虚拟键盘</span>
    <button class="vkb-close" onclick="toggleVKB()"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="vkb-body" id="vkbBody"></div>
  <div class="vkb-pg" id="vkbPg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.js"></script>
<script>
const BP = window.__BASE_PATH__ || "";
let servers=[],commands=[],notes=[],currentNoteId=null;
let settings={theme:'dark',bg:{type:'color',value:'#0f0f1a',opacity:1}};
let tabs=[],activeTabId=null,tabCounter=0;

// ─── Boot ───
(async function boot(){
  document.getElementById('loadingScreen').style.display='flex';
  try{settings=await(await fetch(BP+'/api/settings')).json()}catch(e){}
  setTheme(settings.theme||'dark');applyBgToDOM();applySettingsUI();
  await Promise.all([loadServers(),loadCommands(),loadNotes()]);
  document.getElementById('loadingScreen').classList.add('hide');
  setTimeout(()=>{document.getElementById('loadingScreen').style.display='none'},400);
  // Check cookie auth
  if(checkAuthCookie()){
    document.getElementById('app').classList.add('show');
  }else{
    document.getElementById('gate').style.display='flex';
    document.getElementById('gatePwd').focus();
    document.getElementById('gatePwd').addEventListener('keydown',e=>{if(e.key==='Enter')submitGate()});
  }
  document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>goPage(b.dataset.p)));
  document.addEventListener('click',e=>{const p=document.getElementById('settPanel');if(p.classList.contains('show')&&!p.contains(e.target)&&!e.target.closest('.hdr-btn[title=设置]')&&!e.target.closest('.fa-gear'))p.classList.remove('show')});
})();

function checkAuthCookie(){
  const m=document.cookie.match(/(?:^|;\s*)webssh_auth=([^;]+)/);
  if(!m)return false;
  try{const d=JSON.parse(atob(m[1]));return d.exp>Date.now()}catch(e){return false}
}
function setAuthCookie(pwd){
  const exp=Date.now()+6*60*60*1000; // 6 hours
  const val=btoa(JSON.stringify({exp}));
  document.cookie=`webssh_auth=${val};path=/;max-age=${6*60*60};SameSite=Lax`;
}

function submitGate(){
  const pwd=document.getElementById('gatePwd').value;
  if(!pwd)return;
  const btn=document.getElementById('gateBtn');
  btn.classList.add('loading');btn.textContent='验证中';
  fetch(BP+'/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd})})
  .then(r=>r.json()).then(d=>{
    if(d.ok){
      setAuthCookie(pwd);
      document.getElementById('gate').style.display='none';
      document.getElementById('app').classList.add('show');
    }else{
      document.getElementById('gateErr').textContent=d.error||'密码错误';
      document.getElementById('gatePwd').value='';
      document.getElementById('gatePwd').focus();
      btn.classList.remove('loading');btn.textContent='登  录';
    }
  }).catch(()=>{document.getElementById('gateErr').textContent='连接失败';btn.classList.remove('loading');btn.textContent='登  录'});
}

function toast(msg,type='info'){const icons={ok:'fa-circle-check',err:'fa-circle-xmark',info:'fa-circle-info'};const el=document.createElement('div');el.className='toast '+type;el.innerHTML=`<i class="fa-solid ${icons[type]}" style="color:var(--${type==='ok'?'green':type==='err'?'red':'accent'})"></i><span>${msg}</span>`;document.getElementById('toasts').appendChild(el);setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(24px)';setTimeout(()=>el.remove(),200)},2200)}

function setTheme(t){document.documentElement.dataset.theme=t;settings.theme=t;saveSettings();document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('on',b.classList.contains(t==='dark'?'dk':'lt')));tabs.forEach(tab=>{if(tab.term)tab.term.options.theme=termTheme()});applyBgToDOM()}
function toggleTheme(){setTheme(settings.theme==='dark'?'light':'dark')}
function toggleSett(){document.getElementById('settPanel').classList.toggle('show')}

function applyBg(){const type=document.getElementById('sBgType').value;const op=parseFloat(document.getElementById('sBgOp').value);document.getElementById('rowBgC').style.display=type==='color'?'':'none';document.getElementById('rowBgU').style.display=type==='url'?'':'none';document.getElementById('rowBgF').style.display=type==='upload'?'':'none';settings.bg={type,value:type==='color'?document.getElementById('sBgColor').value:document.getElementById('sBgUrl').value,opacity:op};saveSettings();applyBgToDOM()}
function applyBgToDOM(){const s=settings.bg,l=document.getElementById('bgLayer');l.style.opacity=s.opacity;if(s.type==='color'){l.style.background=s.value;l.innerHTML=''}else if(s.value){l.style.background='';l.innerHTML=`<img src="${s.value}">`}else{l.style.background='';l.innerHTML=''}}
function uploadBg(input){const file=input.files[0];if(!file)return;const r=new FileReader();r.onload=async()=>{const ext=file.name.split('.').pop();const res=await fetch(BP+'/api/upload',{method:'POST',headers:{'x-ext':ext},body:r.result});const{url}=await res.json();document.getElementById('sBgUrl').value=url;document.getElementById('sBgType').value='url';applyBg()};r.readAsArrayBuffer(file)}
function applySettingsUI(){const s=settings.bg;document.getElementById('sBgType').value=s.type;document.getElementById('sBgColor').value=s.type==='color'?s.value:'#0f0f1a';document.getElementById('sBgUrl').value=s.type!=='color'?s.value:'';document.getElementById('sBgOp').value=s.opacity;document.getElementById('rowBgC').style.display=s.type==='color'?'':'none';document.getElementById('rowBgU').style.display=s.type==='url'?'':'none';document.getElementById('rowBgF').style.display=s.type==='upload'?'':'none';document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('on',b.classList.contains(settings.theme==='dark'?'dk':'lt')))}
async function loadSettings(){try{settings=await(await fetch(BP+'/api/settings')).json()}catch(e){}setTheme(settings.theme||'dark');applyBgToDOM();applySettingsUI()}
async function saveSettings(){await fetch(BP+'/api/settings',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(settings)})}

async function changePwd(){
  const pwd=document.getElementById('sNewPwd').value.trim();
  if(!pwd)return toast('请输入新密码','err');
  await fetch(BP+'/api/settings',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd})});
  document.getElementById('sNewPwd').value='';
  toast('密码已更新','ok');
}

function goPage(p){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.p===p));document.querySelectorAll('.page').forEach(pg=>pg.classList.toggle('active',pg.id==='pg-'+p));if(p==='terminal'&&activeTabId){const t=tabs.find(x=>x.id===activeTabId);if(t&&t.fitAddon)setTimeout(()=>{t.fitAddon.fit();t.term&&t.term.focus()},50)}if(p==='commands')renderCommands();if(p==='notes')renderNotesList()}

// ─── Servers ───
async function loadServers(){try{servers=await(await fetch(BP+'/api/servers')).json()}catch(e){servers=[]}renderServers()}
function renderServers(){const el=document.getElementById('srvList');let h=servers.map(s=>`<div class="srv-row ${s.type}" onclick="connectSrv('${s.id}')">
  <div class="sr-icon"><i class="fa-solid fa-${s.type==='local'?'house':'globe'}"></i></div>
  <div class="sr-info"><div class="sr-name">${esc(s.name)}</div><div class="sr-addr">${s.type==='local'?'本地终端':esc(s.host)+':'+s.port}</div></div>
  <div class="sr-actions">
    <button class="sr-act edit-btn" onclick="event.stopPropagation();editSrv('${s.id}')" title="编辑"><i class="fa-solid fa-pen" style="font-size:10px"></i></button>
    <button class="sr-act" onclick="event.stopPropagation();delSrv('${s.id}')" title="删除"><i class="fa-solid fa-trash" style="font-size:10px"></i></button>
  </div></div>`).join('');
h+=`<div class="srv-add" onclick="showAddSrv()"><i class="fa-solid fa-plus"></i> 添加服务器</div>`;el.innerHTML=h}
function connectSrv(id){const s=servers.find(x=>x.id===id);if(!s)return;openTermTab(s);goPage('terminal')}

function showAddSrv(){mkModal('添加服务器',`<div class="fg"><label>名称</label><input id="mName" placeholder="服务器名称"></div>
  <div class="fg"><label>类型</label><div class="radio-grp">
    <div class="radio-opt sel" onclick="selType(this,'local')"><i class="fa-solid fa-house"></i> 本地</div>
    <div class="radio-opt" onclick="selType(this,'remote')"><i class="fa-solid fa-globe"></i> 远程</div></div></div>
  <div id="mRemote" style="display:none">
    <div class="fg-row"><div class="fg"><label>主机</label><input id="mHost" placeholder="IP / 域名"></div><div class="fg"><label>端口</label><input id="mPort" value="22"></div></div>
    <div class="fg"><label>用户名</label><input id="mUser" value="root"></div>
    <div class="auth-section">
      <div class="fg"><label>认证方式</label><div class="radio-grp">
        <div class="radio-opt sel" onclick="selAuth(this,'password')"><i class="fa-solid fa-key"></i> 密码</div>
        <div class="radio-opt" onclick="selAuth(this,'key')"><i class="fa-solid fa-lock"></i> 密钥</div></div></div>
      <div id="authPwd"><div class="fg"><label>密码</label><input id="mPwd" type="password" placeholder="SSH密码"></div></div>
      <div id="authKey" style="display:none"><div class="fg"><label>密钥路径</label><input id="mKey" placeholder="~/.ssh/id_rsa"></div></div>
    </div>
  </div>`,
  [{label:'取消',cls:'btn-g',fn:'closeModal()'},{label:'添加',cls:'btn-p',fn:'addSrv()'}])}
function selType(el,type){el.parentElement.querySelectorAll('.radio-opt').forEach(r=>r.classList.remove('sel'));el.classList.add('sel');document.getElementById('mRemote').style.display=type==='remote'?'':'none'}
function selAuth(el,type){el.parentElement.querySelectorAll('.radio-opt').forEach(r=>r.classList.remove('sel'));el.classList.add('sel');document.getElementById('authPwd').style.display=type==='password'?'':'none';document.getElementById('authKey').style.display=type==='key'?'':'none'}

function openTermTab(server){tabCounter++;const tabId='t'+tabCounter;const tab={id:tabId,name:server.name,serverId:server.id,term:null,ws:null,fitAddon:null,paneEl:null};tabs.push(tab);renderTabs();activateTab(tabId);const pane=document.createElement('div');pane.className='term-pane on';pane.id='pane_'+tabId;document.getElementById('termBody').appendChild(pane);tab.paneEl=pane;const fs=parseInt(document.getElementById('sFontSize').value)||14;const term=new Terminal({fontSize:fs,fontFamily:"'SF Mono',Monaco,Consolas,'Courier New',monospace",theme:termTheme(),cursorBlink:false,allowProposedApi:true,allowTransparency:true,scrollback:2000,convertEol:true,smoothScrollDuration:120});const fit=new FitAddon.FitAddon();term.loadAddon(fit);term.loadAddon(new WebLinksAddon.WebLinksAddon());term.open(pane);setTimeout(()=>{fit.fit();term.scrollBottom();term.focus()},80);tab.term=term;tab.fitAddon=fit;
// Selection copy: double-click to select + copy, right-click to copy
term.attachCustomKeyEventHandler(ev=>{
  // Ctrl+Shift+C = copy selection
  if(ev.ctrlKey&&ev.shiftKey&&ev.key==='C'&&ev.type==='keydown'){
    const sel=term.getSelection();if(sel){navigator.clipboard.writeText(sel).catch(()=>{});toast('已复制','ok')}
    return false;
  }
  // Ctrl+Shift+V = paste
  if(ev.ctrlKey&&ev.shiftKey&&ev.key==='V'&&ev.type==='keydown'){
    navigator.clipboard.readText().then(txt=>{if(txt&&ws.readyState===1)ws.send(txt)}).catch(()=>{});
    return false;
  }
  return true;
});
pane.addEventListener('mouseup',()=>{const sel=term.getSelection();if(sel){navigator.clipboard.writeText(sel).catch(()=>{})}});
pane.addEventListener('dblclick',()=>{const sel=term.getSelection();if(sel){navigator.clipboard.writeText(sel).catch(()=>{});toast('已复制','ok')}});const proto=location.protocol==='https:'?'wss:':'ws:';const ws=new WebSocket(`${proto}//${location.host}${BP}/ws?tab=${tabId}`);ws.onopen=()=>{document.getElementById('sDot').classList.add('on');fit.fit();ws.send(JSON.stringify({type:'resize',cols:term.cols,rows:term.rows}))};
ws.onmessage=e=>{
  const d=e.data;
  // Check if it's a JSON control message (exit)
  if(d[0]==='{'){
    try{const m=JSON.parse(d);if(m.type==='exit'){term.write('\r\n\x1b[33m[已退出]\x1b[0m\r\n');return}}catch(err){}
  }
  // Otherwise it's raw terminal output - write directly
  term.write(d);
  term.scrollBottom();
};
ws.onclose=()=>{document.getElementById('sDot').classList.remove('on')};
term.onData(d=>{if(ws.readyState===1)ws.send(d)});tab.ws=ws;const onResize=()=>{if(tab.fitAddon)tab.fitAddon.fit()};window.addEventListener('resize',onResize);tab._onResize=onResize}

function renderVKBPage(){
  const body=document.getElementById('vkbBody');
  const pg=document.getElementById('vkbPg');
  const page=VKB_PAGES[vkbPage];

  // 粘贴专属页面
  if(page.type==='paste'){
    body.innerHTML=`<div class="vkb-clip-page">
      <textarea class="vkb-clip-textarea" id="vkbClipArea" placeholder="在此输入或粘贴内容..." rows="5"></textarea>
      <div class="vkb-clip-actions">
        <button class="vkb-clip-action paste" onclick="vkbPaste()"><i class="fa-solid fa-paste"></i> 从剪贴板粘贴</button>
        <button class="vkb-clip-action send" onclick="vkbClipSend()"><i class="fa-solid fa-paper-plane"></i> 发送到终端</button>
      </div>
    </div>`;
  }else{
    body.innerHTML=page.rows.map(r=>'<div class="vkb-row">'+r.map(b=>{
      const cls='vkb-btn'+(b.w==='wide'?' wide':'')+(b.w==='wider'?' wider':'')+(b.w==='space'?' space':'')+(b.w==='mod'?' mod':'')+(b.w==='combo'?' combo':'');
      const id=b.id?` id="${b.id}"`:'';
      const on=(b.id==='vkbCtrl'&&vkbCtrlOn)||(b.id==='vkbAlt'&&vkbAltOn)?' on':'';
      let fn;
      if(b.w==='combo')fn=`vkbCombo('${b.k}')`;
      else if(b.w==='mod')fn=`vkbMod('${b.k}')`;
      else fn=`vkbPress('${b.k}')`;
      return `<button class="${cls}${on}"${id} onclick="${fn}">${b.t}</button>`;
    }).join('')+'</div>').join('');
  }

  const tabsHtml=VKB_PAGES.map((p,i)=>{
    return `<button class="${i===vkbPage?'on':''}" onclick="vkbGoPage(${i})">${p.name}</button>`;
  }).join('');

}

function vkbGoPage(n){vkbPage=n;renderVKBPage()}

// ── 粘贴发送功能 ──
async function vkbPaste(){
  try{
    const txt=await navigator.clipboard.readText();
    if(txt){
      const area=document.getElementById('vkbClipArea');
      if(area){area.value=txt;area.focus()}
      toast('已粘贴','ok');
    }else{
      toast('剪贴板为空','err');
    }
  }catch(e){
    const area=document.getElementById('vkbClipArea');
    if(area){area.focus();document.execCommand('paste')}
    if(!area||!area.value)toast('请手动长按粘贴','err');
  }
}
function vkbClipSend(){
  const area=document.getElementById('vkbClipArea');
  const txt=area?area.value:'';
  if(!txt)return toast('内容为空','err');
  if(!activeTabId)return toast('无终端连接','err');
  const tab=tabs.find(t=>t.id===activeTabId);
  if(!tab||!tab.ws||tab.ws.readyState!==1)return toast('终端未就绪','err');
  // 逐行发送，每行之间加回车
  const lines=txt.split('\n');
  lines.forEach((line,i)=>{
    tab.ws.send(line);
    if(i<lines.length-1)tab.ws.send('\r');
  });
  area.value='';
  toast('已发送','ok');
  tab.term&&tab.term.focus();
}

function vkbMod(k){
  if(k==='Ctrl'){vkbCtrlOn=!vkbCtrlOn;const el=document.getElementById('vkbCtrl');if(el)el.classList.toggle('on',vkbCtrlOn)}
  if(k==='Alt'){vkbAltOn=!vkbAltOn;const el=document.getElementById('vkbAlt');if(el)el.classList.toggle('on',vkbAltOn)}
}
function vkbCombo(k){
  if(!activeTabId)return;const tab=tabs.find(t=>t.id===activeTabId);
  if(!tab||!tab.ws||tab.ws.readyState!==1)return;
  // e.g. k='Ctrl+C' → send \x03
  const letter=k.split('+')[1];
  if(letter)tab.ws.send(String.fromCharCode(letter.toUpperCase().charCodeAt(0)-64));
  tab.term&&tab.term.focus();
}
function vkbPress(k){
  if(!activeTabId)return;const tab=tabs.find(t=>t.id===activeTabId);
  if(!tab||!tab.ws||tab.ws.readyState!==1)return;
  const map={
    'Up':'\x1b[A','Down':'\x1b[B','Right':'\x1b[C','Left':'\x1b[D',
    'Home':'\x1b[H','End':'\x1b[F','PgUp':'\x1b[5~','PgDn':'\x1b[6~',
    'Enter':'\r','Tab':'\t','Esc':'\x1b','Backspace':'\x7f','Space':' ',
    'Insert':'\x1b[2~','Delete':'\x1b[3~',
    'F1':'\x1bOP','F2':'\x1bOQ','F3':'\x1bOR','F4':'\x1bOS',
    'F5':'\x1b[15~','F6':'\x1b[17~','F7':'\x1b[18~','F8':'\x1b[19~',
    'F9':'\x1b[20~','F10':'\x1b[21~','F11':'\x1b[23~','F12':'\x1b[24~',
  };
  let seq=map[k]||k;
  if(vkbCtrlOn&&seq.length===1)seq=String.fromCharCode(seq.charCodeAt(0)&0x1f);
  if(vkbAltOn)seq='\x1b'+seq;
  tab.ws.send(seq);
  if(k!=='Ctrl'&&k!=='Alt'){vkbCtrlOn=false;vkbAltOn=false;renderVKBPage()}
  tab.term&&tab.term.focus();
}

// Drag support
(function(){
  const panel=document.getElementById('vkbPanel');
  const handle=document.getElementById('vkbDrag');
  let dragging=false,sx,sy,ox,oy;
  function onStart(e){
    const touch=e.touches?e.touches[0]:e;
    if(e.target.closest('.vkb-close'))return;
    dragging=true;sx=touch.clientX;sy=touch.clientY;
    const r=panel.getBoundingClientRect();ox=r.left;oy=r.top;
    e.preventDefault();
  }
  function onMove(e){
    if(!dragging)return;
    const touch=e.touches?e.touches[0]:e;
    let nx=ox+(touch.clientX-sx),ny=oy+(touch.clientY-sy);
    nx=Math.max(0,Math.min(nx,window.innerWidth-panel.offsetWidth));
    ny=Math.max(0,Math.min(ny,window.innerHeight-panel.offsetHeight));
    panel.style.left=nx+'px';panel.style.top=ny+'px';panel.style.bottom='auto';
    e.preventDefault();
  }
  function onEnd(){dragging=false}
  handle.addEventListener('mousedown',onStart);
  handle.addEventListener('touchstart',onStart,{passive:false});
  document.addEventListener('mousemove',onMove);
  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('mouseup',onEnd);
  document.addEventListener('touchend',onEnd);
})();

function runCmd(id){const cmd=commands.find(c=>c.id===id);if(!cmd)return;if(!activeTabId||!tabs.length){toast('请先打开终端','err');return}const tab=tabs.find(t=>t.id===activeTabId);if(tab&&tab.ws&&tab.ws.readyState===1&&tab.term){goPage('terminal');setTimeout(()=>{tab.fitAddon&&tab.fitAddon.fit();tab.term.focus();tab.ws.send(cmd.command+'\n');toast('已发送: '+cmd.name,'ok')},100)}else toast('终端未连接','err')}

// ─── Commands Page ───
function renderCommands(){const el=document.getElementById('cmdList');if(!commands.length){el.innerHTML='<div class="cmd-empty"><i class="fa-solid fa-code" style="font-size:24px;opacity:0.12;display:block;margin-bottom:6px"></i>暂无命令</div>';return}
const cats={system:'fa-microchip',network:'fa-network-wired',docker:'fa-docker',git:'fa-git-alt',general:'fa-bolt',custom:'fa-star'};
el.innerHTML=commands.map(c=>`<div class="cmd-row"><div class="cr-icon"><i class="fa-solid ${cats[c.category]||'fa-bolt'}"></i></div>
  <div class="cr-info"><div class="cr-name">${esc(c.name)}</div><div class="cr-code">${esc(c.command)}</div></div>
  <span class="cr-cat">${esc(c.category)}</span>
  <div class="cr-actions">
    <button class="cr-btn" onclick="copyCmd('${c.id}')" title="复制"><i class="fa-solid fa-copy"></i></button>
    <button class="cr-btn" onclick="runCmd('${c.id}')" title="执行"><i class="fa-solid fa-play"></i></button>
    <button class="cr-btn" onclick="showEditCmd('${c.id}')" title="编辑"><i class="fa-solid fa-pen"></i></button>
    <button class="cr-btn del" onclick="delCmd('${c.id}')" title="删除"><i class="fa-solid fa-trash"></i></button>
  </div></div>`).join('')}

function showAddCmd(){mkModal('添加命令',`<div class="fg"><label>名称</label><input id="mCName" placeholder="例：查看磁盘"></div>
  <div class="fg"><label>分类</label><select id="mCCat"><option value="general">通用</option><option value="system">系统</option><option value="network">网络</option><option value="docker">Docker</option><option value="git">Git</option><option value="custom">自定义</option></select></div>
  <div class="fg"><label>命令</label><textarea id="mCCode" rows="4" placeholder="输入命令..." style="font-family:monospace"></textarea></div>`,
  [{label:'取消',cls:'btn-g',fn:'closeModal()'},{label:'添加',cls:'btn-p',fn:'addCmd()'}])}
function showEditCmd(id){const c=commands.find(x=>x.id===id);if(!c)return;mkModal('编辑命令',`<div class="fg"><label>名称</label><input id="mCName" value="${esc(c.name)}"></div>
  <div class="fg"><label>分类</label><select id="mCCat">${['general','system','network','docker','git','custom'].map(v=>`<option value="${v}" ${c.category===v?'selected':''}>${v}</option>`).join('')}</select></div>
  <div class="fg"><label>命令</label><textarea id="mCCode" rows="4" style="font-family:monospace">${esc(c.command)}</textarea></div>`,
  [{label:'取消',cls:'btn-g',fn:'closeModal()'},{label:'保存',cls:'btn-p',fn:`saveCmd('${id}')`}])}
async function addCmd(){const name=v('mCName'),command=v('mCCode'),category=v('mCCat');if(!name||!command)return toast('名称和命令不能为空','err');await fetch(BP+'/api/commands',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,command,category})});closeModal();loadCommands();toast('已添加','ok')}
async function saveCmd(id){const name=v('mCName'),command=v('mCCode'),category=v('mCCat');if(!name||!command)return toast('不能为空','err');await fetch(BP+'/api/commands/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,command,category})});closeModal();loadCommands();toast('已保存','ok')}
function copyCmd(id){const c=commands.find(x=>x.id===id);if(c){navigator.clipboard.writeText(c.command);toast('已复制','ok')}}
async function delCmd(id){await fetch(BP+'/api/commands/'+id,{method:'DELETE'});loadCommands();toast('已删除','ok')}

// ─── Notes ───
async function loadNotes(){try{notes=await(await fetch(BP+'/api/notes')).json()}catch(e){notes=[]}renderNotesList()}
function renderNotesList(){const el=document.getElementById('nsList');if(!notes.length){el.innerHTML='<div style="padding:14px;text-align:center;color:var(--text3);font-size:11px">暂无笔记</div>';return}el.innerHTML=notes.map(n=>`<div class="ns-item ${n.id===currentNoteId?'on':''}" onclick="selNote('${n.id}')"><div class="ni-t">${esc(n.title)}</div><div class="ni-d">${new Date(n.updatedAt).toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div></div>`).join('')}
function selNote(id){currentNoteId=id;const n=notes.find(x=>x.id===id);if(!n)return;document.getElementById('nTitle').value=n.title;document.getElementById('nContent').value=n.content||'';document.getElementById('nTitle').style.display='';document.getElementById('nContent').style.display='';document.getElementById('noteEmpty').style.display='none';renderNotesList()}
async function createNote(){const res=await fetch(BP+'/api/notes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:'新笔记',content:''})});const n=await res.json();await loadNotes();selNote(n.id);toast('已创建','ok')}
let noteTimer=null;document.getElementById('nTitle').addEventListener('input',()=>{clearTimeout(noteTimer);noteTimer=setTimeout(saveNote,1200)});document.getElementById('nContent').addEventListener('input',()=>{clearTimeout(noteTimer);noteTimer=setTimeout(saveNote,1200)});
async function saveNote(){if(!currentNoteId)return;await fetch(BP+'/api/notes/'+currentNoteId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:v('nTitle')||'未命名',content:v('nContent')})});loadNotes()}

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
</script>
</body>
</html>
